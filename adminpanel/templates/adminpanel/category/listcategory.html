<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1">
        <thead>
            <tr>
                <th>Category Name</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for category in categories %}
            <tr>
                <td>{{ category.category_name }}</td>
                <td>
                    <a href="{% url 'adminpanel:editcategory' category.id %}">Edit</a>
                    <a href="{% url 'adminpanel:deletecategory' category.id %}">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
</body>
</html>

{% if msg %}
<script>
    alert("{{ msg }}");
    window.location="{% url 'adminpanel:listcategory' %}";
</script>
{% endif %}
