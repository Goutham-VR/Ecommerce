<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Images</title>
</head>
<body>
    <form action="" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <table cellpadding="10" cellspacing="0" border="1" align="center">
            <tr>
                <td><label for="product_image">Product Image:</label></td>
                <td><input type="file" id="product_image" name="product_image" required></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><button type="submit">Add Product Image</button></td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <a href="{% url 'adminpanel:listimage' product_id %}">Back to Product Images</a>
                </td>
            </tr>
        </table>
    </form>
    
</body>
</html>

{% if msg %}
<script>
    alert("{{ msg }}");
    window.location="{% url 'adminpanel:addproductimage' product_id %}";
</script>
{% endif %}
