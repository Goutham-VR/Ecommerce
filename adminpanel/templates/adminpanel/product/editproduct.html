<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product</title>
</head>
<body>
    <form action="" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <table cellpadding="10" cellspacing="0" border="1" align="center">
            <tr>
                <td><label for="product_name">Product Name:</label></td>
                <td>
                    <input type="text" id="product_name" name="product_name" value="{{ product.product_name }}" required>
                </td>
            </tr>

            <tr>
                <td><label for="product_sku">Product SKU:</label></td>
                <td>
                    <input type="text" name="sku" value="{{ product.product_sku }}" required>
                </td>
            </tr>

            <tr>
                <td><label for="product_description">Product Description:</label></td>
                <td>
                    <textarea id="product_description" name="product_description" required>{{ product.product_description }}</textarea>
                </td>
            </tr>

            <tr>
                <td><label for="product_brand">Product Brand:</label></td>
                <td>
                    <select id="sel_brand" name="sel_brand" required>
                        {% for brand in brands %}
                            {% if brand.id == product.brand.id %}
                                <option value="{{ brand.id }}" selected>{{ brand.brand_name }}</option>
                            {% else %}
                                <option value="{{ brand.id }}">{{ brand.brand_name }}</option>
                            {% endif %}
                        {% endfor %}
                    </select>
                </td>
            </tr>

            <tr>
                <td><label for="sel_category">Select Category:</label></td>
                <td>
                    <select id="sel_category" name="sel_category" required>
                        {% for category in categories %}
                            {% if category.id == product.subcategory.category.id %}
                                <option value="{{ category.id }}" selected>{{ category.category_name }}</option>
                            {% else %}
                                <option value="{{ category.id }}">{{ category.category_name }}</option>
                            {% endif %}
                        {% endfor %}
                    </select>
                </td>
            </tr>

            <tr>
                <td>
                    <label for="section">Select Section:</label></td>
                <td>
                    <select id="sel_section" name="sel_section" required>
                        <option value="">Select Section</option>
                        {% for section in sections %}
                        <option value="{{ section.id }}"
                        {% if section.id == product.subcategory.section.id %}
                        selected
                        {% endif %}>
                        {{ section.section_name }}</option>
                        {% endfor %}
                    </select>
                </td>
            </tr>

            <tr>
                <td><label for="sel_subcategory">Select Subcategory:</label></td>
                <td>
                    <select id="sel_subcategory" name="sel_subcategory" required>
                        {% for subcategory in subcategories %}
                            {% if subcategory.id == product.subcategory.id %}
                                <option value="{{ subcategory.id }}" selected>{{ subcategory.subcategory_name }}</option>
                            {% else %}
                                <option value="{{ subcategory.id }}">{{ subcategory.subcategory_name }}</option>
                            {% endif %}
                        {% endfor %}
                    </select>
                </td>
            </tr>
            <tr>
                <td><label for="product_gst">Product GST:</label></td>
                <td>
                    <input type="number" id="product_gst" value="{{product.product_gst}}" name="product_gst" required>
                </td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <button type="submit">Update Product</button>
                </td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <a href="{% url 'adminpanel:listproduct' %}">List Product</a>
                </td>
            </tr>
        </table>
    </form>
</body>
</html>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
    $("#sel_category").change(function () {
        var cid = $(this).val();
        var ur = "{% url 'adminpanel:ajaxsection' %}";
        $.ajax({
            url: ur,
            data: { cid: cid },
            success: function (data) {
                $("#sel_section").html(data);
            },
        });
    });
</script>

<script>
        $("#sel_section").change(function () {
            var sid = $(this).val();
            var ur = "{% url 'adminpanel:ajaxsubcategory' %}";
            $.ajax({
                url: ur,
                data: { sid: sid },
                success: function (data) {
                    $("#sel_subcategory").html(data);
                },
            });
        });
</script>

{% if msg %}
<script>
    alert("{{ msg }}");
    window.location="{% url 'adminpanel:listproduct' %}";
</script>
{% endif %}
