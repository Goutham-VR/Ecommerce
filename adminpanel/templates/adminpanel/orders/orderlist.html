<table border="1">

<tr>
    <th>Order No</th>
    <th>Customer</th>
    <th>Amount</th>
    <th>Status</th>
    <th>Date</th>
    <th>Action</th>
</tr>

{% for order in orders %}

<tr>

    <td>
        {{ order.order_number }}
    </td>

    <td>
        {{ order.user.name }}
    </td>

    <td>
        ₹{{ order.final_amount }}
    </td>

    <td>
        {{ order.status }}
    </td>

    <td>
        {{ order.created_at }}
    </td>

    <td>

        <a href="{% url 'adminpanel:orderdetail' order.id %}">
            View
        </a>

    </td>

</tr>

{% endfor %}

</table>
