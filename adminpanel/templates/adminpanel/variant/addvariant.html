<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varient</title>
</head>
<body>
    <form action="" method="post">
        {% csrf_token %}
        <table cellpadding="10" cellspacing="0" border="1" align="center">
            <tr>
                <td><label for="size">Size:</label></td>
                <td><input type="text" id="size" name="size" required></td>
            </tr>
            <tr>
                <td><label for="color">Color:</label></td>
                <td><input type="text" id="color" name="color" required></td>
            </tr>
            <tr>
                <td><label for="price">Price:</label></td>
                <td><input type="number" id="price" name="variant_price" step="0.01" required></td>
            </tr>
            <tr>
                <td><label for="stock">Stock:</label></td>
                <td><input type="number" id="stock" name="stock" required></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><button type="submit">Add Variant</button></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><a href="{% url 'adminpanel:listvariant' product_id %}">Back to Variant Lists</a></td>
            </tr>
        </table>
    </form>
    
</body>
</html>
{% if msg %}
<script>
    alert("{{ msg }}");
    window.location="{% url 'adminpanel:addproductvariant' product_id %}";
</script>
{% endif %}
