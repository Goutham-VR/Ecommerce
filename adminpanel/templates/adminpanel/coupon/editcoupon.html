<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Coupon</title>
</head>
<body>
    <form method="post">
        {% csrf_token %}
        <table cellpadding="10" align="center" border="1">
            <tr>
                <td>Coupon Code</td>
                <td>
                    <input type="text" name="txt_couponcode" id="result" value="{{editdata.coupon_code}}" required style="text-transform:uppercase;" >
                    <button type="button" onclick="generatecode()">GENERATE</button>
                </td>
            </tr>

            <tr>
                <td>Discount (%)</td>
                <td>
                    <input type="number" name="txt_discount" value="{{editdata.discount_percentage}}" min="1" max="100" step="0.01" required >
                </td>
            </tr>

            <tr>
                <td>Minimum Amount</td>
                <td>
                    <input type="number" name="txt_minamount" value="{{editdata.minimum_amount}}" min="0" step="0.01" required >
                </td>
            </tr>

            <tr>
                <td>Maximum Discount</td>
                <td>
                    <input type="number" name="txt_maxdiscount" value="{{editdata.max_discount}}" min="0" step="0.01" required>
                </td>
            </tr>

            <tr>
                <td>Expiry Date</td>
                <td>
                    <input type="date" name="txt_expirydate" value="{{editdata.expiry_date|date:'Y-m-d'}}" required>
                </td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <input type="reset" value="CLEAR">
                    <input type="submit" value="SUBMIT">
                </td>
            </tr>
        </table>
    </form>
    <a href="{% url 'adminpanel:couponlist' %}">View Coupon List</a>

</body>
</html>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
function generatecode()
{
    var ur = "{% url 'adminpanel:ajaxgeneratecouponcode' %}";
    $.ajax({
        url: ur,
        success: function(data)
        {
            $("#result").val(data);
        },
        error: function()
        {
            alert("Unable to generate coupon code.");
        }
    });
}
</script>

{% if msg %}
<script>
    alert("{{msg}}");
    window.location="{% url 'adminpanel:editcoupon' coupon_id %}"
</script>
{% endif %}
