<h2>My Orders</h2>

<table border="1">

<tr>
    <th>Order No</th>
    <th>Date</th>
    <th>Amount</th>
    <th>Status</th>
    <th>Action</th>
</tr>

{% for order in orders %}
<tr>

    <td>{{ order.order_number }}</td>

    <td>{{ order.created_at }}</td>

    <td>₹{{ order.final_amount }}</td>

    <td>{{ order.status }}</td>

    <td>
        <a href="{% url 'orders:orderdetail' order.id %}">
            View
        </a>
    </td>

</tr>
{% endfor %}

</table>
