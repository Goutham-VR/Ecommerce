<h2>My Wishlist</h2>

<table border="1">

<tr>
    <th>Product</th>
    <th>Brand</th>
    <th>Action</th>
</tr>

{% for item in items %}

<tr>

    <td>
        {{ item.product.product_name }}
    </td>

    <td>
        {{ item.product.brand.brand_name }}
    </td>

    <td>

        <a href="{% url 'products:productdetail' item.product.product_slug %}">
            View
        </a>

        <br>

        <a href="{% url 'wishlist:removewishlistitem' item.id %}">
            Remove
        </a>

    </td>

</tr>

{% empty %}

<tr>
    <td colspan="3">
        Wishlist Empty
    </td>
</tr>

{% endfor %}

</table>
