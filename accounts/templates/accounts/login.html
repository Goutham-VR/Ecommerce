<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>

    <form method="post">
        {% csrf_token %}

        <table border="1" cellpadding="10" cellspacing="0" align="center">

            <tr>
                <th colspan="2">User Login</th>
            </tr>

            <tr>
                <td>Email</td>
                <td>
                    <input
                        type="email"
                        name="email"
                        required
                    >
                </td>
            </tr>

            <tr>
                <td>Password</td>
                <td>
                    <input
                        type="password"
                        name="password"
                        required
                    >
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <button type="submit">
                        Login
                    </button>
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <a href="{% url 'accounts:register' %}">
                        Create Account
                    </a>
                </td>
            </tr>

        </table>

    </form>

   {% if msg %}
    <script>
        alert("{{ msg }}");
        window.location="{% url 'accounts:login' %}";
    </script>
{% endif %}
</body>
</html>
